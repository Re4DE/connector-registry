stages:
  - test
  - docker
  - helm

default:
  tags:
    - dena

unit-test:
  image: node:20.15.0
  stage: test
  before_script:
    - npm ci
  script:
    - npm test

docker-build-publish:
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  stage: docker
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "."
      --dockerfile "Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

helm-build-publish:
  image: hub.cc-asp.fraunhofer.de/iee-commons/helm:3.10.2-v1
  stage: helm
  when: manual
  script:
    - helm registry login "${HARBOR_URL}" -u "${HARBOR_USERNAME}" -p "${HARBOR_PASSWORD}"
    - helm dependency update ./chart
    - helm package ./chart
    - helm push ${CI_PROJECT_DIR}/*.tgz ${HARBOR_OCI}/${HARBOR_PROJECT}/charts