name: "Snapshot Build"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    
env:
  IMAGE_NAME: ghcr.io/Re4DE/connector-registry

jobs:
  Snapshot:
    name: "Test, Build and Publish Docker Snapshot image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          npm ci
      - name: Test
        run: |
          npm run lint
          npm test
      - name: Docker Build
        run: docker build -t $IMAGE_NAME:SNAPSHOT .
      - name: Docker Push
        run: docker push $IMAGE_NAME:SNAPSHOT