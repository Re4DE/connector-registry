apiVersion: v1
kind: Service
metadata:
  name: {{ include "common.name" . }}
  namespace: {{ include "common.namespace" . | quote }}
  labels: {{- include "common.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: api
      port: {{ .Values.registry.service.port }}
      protocol: TCP
      targetPort: {{ .Values.registry.service.port }}
  selector: {{- include "common.matchLabels" . | nindent 4 }}
