install:
  mongodb: true

namespaceOverride: ""

registry:
  unregisterTimeout: 60
  image:
    repository: ghcr.io/re4de/connector-registry
    tag: 1.0.1-edc0.14.0
  service:
    port: 3000
  ingress:
    enabled: true
    className: nginx
    host: changeme
    path: /api
    tls:
      enabled: false
      issuer: cert-issuer
  auth:
    apiKey: changeme
  database:
    host: null
    port: 27017
    username: connector-registry
    dbName: registry
    existingSecret: mongodb-secret

mongodb:
  persistence:
    storageClass: changeme
  auth:
    existingSecret: mongodb-secret
    existingSecretPasswordKey: root-password
  customUsers:
    - name: connector-registry
      database: registry
      existingSecret: mongodb-secret
      secretKeys:
        name: name
        database: database
        password: password
