apiVersion: v2
name: connector-registry
description: |
  A Helm chart for the connector registry. The registry deployment consists of the service itself and a MongoDB.
  The MongoDB deployment can be deactivated if a running instance is already available.

type: application
version: 1.0.0
appVersion: 1.0.0-edc0.14.0

dependencies:
  - name: mongodb
    version: 15.6.26
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: install.mongodb